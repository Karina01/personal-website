<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px;
      line-height: 1.7;
      background: #f8f9fa;
      color: #1a1a2e;
    }

    /* Navigation */
    nav {
      background: #fff;
      border-radius: 12px;
      padding: 16px 24px;
      margin-bottom: 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: flex;
      gap: 32px;
    }

    nav a {
      text-decoration: none;
      color: #64748b;
      font-weight: 500;
      font-size: 15px;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #2563eb;
    }

    /* Header Section */
    .header-section {
      background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
      color: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      margin-bottom: 40px;
      text-align: center;
    }

    .header-section h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin: 0 0 12px 0;
      letter-spacing: -0.02em;
    }

    .header-section .tagline {
      font-size: 1.1rem;
      opacity: 0.9;
      font-weight: 400;
      margin: 0;
    }

    /* Section Titles */
    h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a2e;
      margin: 48px 0 24px 0;
      padding-bottom: 12px;
      border-bottom: 3px solid #2563eb;
      display: inline-block;
    }

    /* Job Cards */
    .job-card {
      background: #fff;
      border-radius: 12px;
      padding: 28px 32px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      border-left: 4px solid transparent;
    }

    .job-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      border-left-color: #2563eb;
    }

    .job-card .company {
      font-size: 1.25rem;
      font-weight: 700;
      color: #2563eb;
      margin: 0 0 16px 0;
    }

    .job-card .role {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
      gap: 8px;
    }

    .job-card .role-title {
      font-size: 1rem;
      font-weight: 600;
      color: #1a1a2e;
      margin: 0;
    }

    .job-card .role-dates {
      font-size: 0.875rem;
      color: #64748b;
      font-weight: 500;
    }

    .job-card .location {
      font-size: 0.875rem;
      color: #94a3b8;
      margin: 4px 0 12px 0;
    }

    .job-card ul {
      margin: 12px 0 0 0;
      padding-left: 20px;
      color: #475569;
    }

    .job-card li {
      margin-bottom: 8px;
      line-height: 1.6;
    }

    .job-card li:last-child {
      margin-bottom: 0;
    }

    /* Education Cards */
    .edu-card {
      background: #fff;
      border-radius: 12px;
      padding: 24px 32px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .edu-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    .edu-card .institution {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1a1a2e;
      margin: 0 0 6px 0;
    }

    .edu-card .degree {
      font-size: 0.95rem;
      color: #475569;
      margin: 0;
    }

    .edu-card .year {
      font-size: 0.875rem;
      color: #94a3b8;
      margin-top: 4px;
    }

    /* Contact Page Styles */
    .contact-section {
      background: #fff;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .contact-section h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1a1a2e;
      margin: 0 0 24px 0;
    }

    .contact-section a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
    }

    .contact-section a:hover {
      text-decoration: underline;
    }

    /* Responsive Design */
    @media (max-width: 640px) {
      body {
        padding: 20px 16px;
      }

      nav {
        padding: 14px 20px;
        gap: 24px;
      }

      .header-section {
        padding: 36px 24px;
      }

      .header-section h1 {
        font-size: 2rem;
      }

      .job-card, .edu-card {
        padding: 20px 24px;
      }

      .job-card .role {
        flex-direction: column;
        gap: 4px;
      }

      .contact-section {
        padding: 28px 24px;
      }
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 40px 0 20px 0;
      color: #94a3b8;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <nav>
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/contact' | relative_url }}">Contact</a>
  </nav>
  {{ content }}
  <footer>
    &copy; {{ site.time | date: '%Y' }} Karina Brown
  </footer>
</body>
</html>
