<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px;
      line-height: 1.7;
      background: #f8f9fa;
      color: #1a1a2e;
    }

    /* Navigation */
    nav {
      background: #fff;
      border-radius: 12px;
      padding: 16px 24px;
      margin-bottom: 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: flex;
      gap: 32px;
    }

    nav a {
      text-decoration: none;
      color: #64748b;
      font-weight: 500;
      font-size: 15px;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #2563eb;
    }

    /* Header Section */
    .header-section {
      background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
      color: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      margin-bottom: 40px;
      text-align: center;
    }

    .header-section h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin: 0 0 12px 0;
      letter-spacing: -0.02em;
    }

    .header-section .tagline {
      font-size: 1.1rem;
      opacity: 0.9;
      font-weight: 400;
      margin: 0;
    }

    /* Section Titles */
    h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a2e;
      margin: 48px 0 24px 0;
      padding-bottom: 12px;
      border-bottom: 3px solid #2563eb;
      display: inline-block;
    }

    /* Theme Cards Grid */
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
      margin-top: 40px;
    }

    /* Flip Card Container */
    .flip-card {
      perspective: 1000px;
      height: 280px;
    }

    .flip-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s ease;
      transform-style: preserve-3d;
    }

    .flip-card:hover .flip-card-inner {
      transform: rotateY(180deg);
    }

    .flip-card-front,
    .flip-card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 32px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .flip-card-front {
      background: #fff;
    }

    .flip-card-back {
      transform: rotateY(180deg);
      color: #fff;
    }

    .flip-card-front h3 {
      font-size: 1.4rem;
      font-weight: 700;
      margin: 0;
      color: #1a1a2e;
    }

    .flip-card-front .icon {
      font-size: 2.5rem;
      margin-bottom: 16px;
    }

    .flip-card-back h3 {
      font-size: 1.2rem;
      font-weight: 600;
      margin: 0 0 16px 0;
    }

    .flip-card-back p {
      font-size: 0.95rem;
      line-height: 1.6;
      margin: 0;
      opacity: 0.95;
    }

    /* Card Color Themes */
    .theme-energy .flip-card-front { border-bottom: 4px solid #059669; }
    .theme-energy .flip-card-front h3 { color: #059669; }
    .theme-energy .flip-card-back { background: linear-gradient(135deg, #059669 0%, #047857 100%); }

    .theme-entrepreneurship .flip-card-front { border-bottom: 4px solid #dc2626; }
    .theme-entrepreneurship .flip-card-front h3 { color: #dc2626; }
    .theme-entrepreneurship .flip-card-back { background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%); }

    .theme-strategy .flip-card-front { border-bottom: 4px solid #2563eb; }
    .theme-strategy .flip-card-front h3 { color: #2563eb; }
    .theme-strategy .flip-card-back { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); }

    .theme-data .flip-card-front { border-bottom: 4px solid #7c3aed; }
    .theme-data .flip-card-front h3 { color: #7c3aed; }
    .theme-data .flip-card-back { background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); }

    /* Responsive for mobile */
    @media (max-width: 640px) {
      .theme-grid {
        grid-template-columns: 1fr;
      }

      .flip-card {
        height: 240px;
      }
    }

    /* Contact Page Styles */
    .contact-section {
      background: #fff;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .contact-section h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1a1a2e;
      margin: 0 0 24px 0;
    }

    .contact-section a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
    }

    .contact-section a:hover {
      text-decoration: underline;
    }

    /* Responsive Design */
    @media (max-width: 640px) {
      body {
        padding: 20px 16px;
      }

      nav {
        padding: 14px 20px;
        gap: 24px;
      }

      .header-section {
        padding: 36px 24px;
      }

      .header-section h1 {
        font-size: 2rem;
      }

      .job-card, .edu-card {
        padding: 20px 24px;
      }

      .job-card .role {
        flex-direction: column;
        gap: 4px;
      }

      .contact-section {
        padding: 28px 24px;
      }
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 40px 0 20px 0;
      color: #94a3b8;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <nav>
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/contact' | relative_url }}">Contact</a>
  </nav>
  {{ content }}
  <footer>
    &copy; {{ site.time | date: '%Y' }} Karina Brown
  </footer>
</body>
</html>
