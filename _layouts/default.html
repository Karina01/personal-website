<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 24px;
      line-height: 1.6;
      background: #0a0a0b;
      color: #e4e4e7;
    }

    /* Navigation */
    nav {
      margin-bottom: 60px;
      display: flex;
      gap: 32px;
    }

    nav a {
      text-decoration: none;
      color: #71717a;
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #fff;
    }

    /* Header Section */
    .header-section {
      margin-bottom: 60px;
    }

    .header-section h1 {
      font-size: 3rem;
      font-weight: 700;
      margin: 0 0 12px 0;
      letter-spacing: -0.03em;
      color: #fff;
    }

    .header-section .tagline {
      font-size: 1.1rem;
      color: #71717a;
      font-weight: 400;
      margin: 0;
    }

    /* Theme Cards Grid */
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    /* Flip Card Container */
    .flip-card {
      perspective: 1000px;
      height: 260px;
    }

    .flip-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s ease;
      transform-style: preserve-3d;
    }

    .flip-card:hover .flip-card-inner {
      transform: rotateY(180deg);
    }

    .flip-card-front,
    .flip-card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 32px;
      text-align: center;
    }

    .flip-card-front {
      background: #18181b;
      border: 1px solid #27272a;
    }

    .flip-card-back {
      transform: rotateY(180deg);
    }

    .flip-card-front h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0;
      color: #e4e4e7;
      letter-spacing: -0.01em;
    }

    .flip-card-front .icon {
      margin-bottom: 20px;
      opacity: 0.9;
    }

    .flip-card-front .icon svg {
      width: 32px;
      height: 32px;
      stroke-width: 1.5;
    }

    .flip-card-back h3 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 14px 0;
      color: #fff;
    }

    .flip-card-back p {
      font-size: 0.9rem;
      line-height: 1.6;
      margin: 0;
      opacity: 0.85;
      color: #fff;
    }

    /* Card Color Themes */
    .theme-energy .flip-card-front .icon { color: #22c55e; }
    .theme-energy .flip-card-back { background: #18181b; border: 1px solid #22c55e; }

    .theme-entrepreneurship .flip-card-front .icon { color: #f97316; }
    .theme-entrepreneurship .flip-card-back { background: #18181b; border: 1px solid #f97316; }

    .theme-strategy .flip-card-front .icon { color: #3b82f6; }
    .theme-strategy .flip-card-back { background: #18181b; border: 1px solid #3b82f6; }

    .theme-data .flip-card-front .icon { color: #a855f7; }
    .theme-data .flip-card-back { background: #18181b; border: 1px solid #a855f7; }

    /* Contact Page Styles */
    .contact-section h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: #fff;
      margin: 0 0 48px 0;
      letter-spacing: -0.03em;
    }

    .contact-links {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .contact-link {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 12px;
      text-decoration: none;
      color: #e4e4e7;
      transition: border-color 0.2s, background 0.2s;
    }

    .contact-link:hover {
      border-color: #3b82f6;
      background: #1c1c1f;
    }

    .contact-link .icon {
      color: #71717a;
    }

    .contact-link .icon svg {
      width: 24px;
      height: 24px;
      stroke-width: 1.5;
    }

    .contact-link span {
      font-size: 1rem;
    }

    .contact-info {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      color: #71717a;
    }

    .contact-info .icon svg {
      width: 24px;
      height: 24px;
      stroke-width: 1.5;
    }

    /* Responsive Design */
    @media (max-width: 640px) {
      body {
        padding: 40px 20px;
      }

      .header-section h1 {
        font-size: 2.2rem;
      }

      .theme-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .flip-card {
        height: 220px;
      }
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 60px 0 20px 0;
      color: #3f3f46;
      font-size: 0.8rem;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <nav>
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/contact' | relative_url }}">Contact</a>
  </nav>
  {{ content }}
  <footer>
    &copy; {{ site.time | date: '%Y' }} Karina Brown
  </footer>
</body>
</html>
